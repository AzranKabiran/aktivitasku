name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  release:
    name: Build & Sign Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Decode keystore
        # Store your keystore as a base64 secret: KEYSTORE_BASE64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/aktivitasku.keystore

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AktivitasKu ${{ steps.version.outputs.VERSION }}
          files: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f app/aktivitasku.keystore
