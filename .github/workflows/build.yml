name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Bisa trigger manual dari GitHub

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Buat local.properties
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # 5. Grant permission untuk gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Cache Gradle dependencies (biar build berikutnya lebih cepat)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 8. Upload APK sebagai artifact (bisa didownload)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AktivitasKu-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 9. Tampilkan info APK
      - name: APK Info
        run: |
          echo "✅ Build berhasil!"
          ls -lh app/build/outputs/apk/debug/
