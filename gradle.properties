# Project-wide Gradle settings

# JVM heap size — prevents out-of-memory during build
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Parallel build and caching for faster incremental builds
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# AndroidX — required for modern Jetpack libraries
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Non-transitive R classes — reduces build time on large projects
android.nonTransitiveRClass=true

# Enable Compose compiler metrics (comment out for release)
# android.enableComposeCompilerReports=true
# android.enableComposeCompilerMetrics=true
